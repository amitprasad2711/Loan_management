<!DOCTYPE html>
<html>

<head>

    <title>Loan Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            align-items: center;
        }

        .login-card {
            border: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
        }

        .login-card .card-header {
            background: #ffffff;
            border-bottom: none;
            padding: 2.2rem 2rem 0.5rem 2rem;
            text-align: center;
        }

        .login-card .card-header .icon-circle {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
        }

        .login-card .card-header .icon-circle i {
            color: #fff;
            font-size: 1.7rem;
        }

        .login-card .card-header h3 {
            font-weight: 700;
            color: #1e3c72;
            margin-bottom: 0.2rem;
        }

        .login-card .card-header p {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .login-card .card-body {
            padding: 1.5rem 2.2rem 2.2rem 2.2rem;
        }

        .login-card form p {
            margin-bottom: 1rem;
        }

        .login-card form label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #333;
            margin-bottom: 0.3rem;
            display: block;
        }

        .login-card form input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid #dcdfe4;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-card form input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.15);
        }

        .btn-login {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border: none;
            padding: 0.7rem;
            font-weight: 600;
            border-radius: 8px;
            letter-spacing: 0.3px;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }
    </style>

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center mt-5">

<div class="col-md-4">

<div class="card login-card">

<div class="card-header">
    <div class="icon-circle">
        <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h3>Loan Admin</h3>
    <p>Sign in to manage products & users</p>
</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit" class="btn btn-login btn-primary w-100 text-white mt-2">

Login

</button>

</form>

{% if form.non_field_errors %}

<div class="alert alert-danger mt-3">

{{ form.non_field_errors }}

</div>

{% endif %}

</div>

</div>

</div>

</div>

</div>

</body>

</html>
